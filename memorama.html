<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DishKids</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#dcefe3;
    text-align:center;
}

/* AVATAR */
.avatar-esquina{
position:fixed;
top:15px;
right:15px;
font-size:50px;
background:#fff;
border-radius:50%;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;
opacity:0;
transform:scale(0.3) rotate(-180deg);
animation:entradaAvatar 0.8s ease-out forwards;
}

@keyframes entradaAvatar{
to{
opacity:1;
transform:scale(1) rotate(0deg);
}
}

#menu{
display:none;
}

#nivelTexto{
font-size:24px;
color:#2f5d50;
margin-top:20px;
}

#game{
display:none;
}

#game-board{
display:grid;
gap:10px;
justify-content:center;
margin-top:25px;
}

.card{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.5s;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
backface-visibility:hidden;
}

.card-front{
background:white;
border:2px solid #2f5d50;
transform:rotateY(180deg);
}

.card-back{
background:#2f5d50;
color:white;
}

#message{
margin-top:20px;
font-size:24px;
color:#1d3b33;
}

#backBtn{
margin-top:20px;
padding:12px 22px;
border:none;
border-radius:10px;
background:#2f5d50;
color:white;
font-size:18px;
cursor:pointer;
}

/* INSTRUCTIVO */
#instructivo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#cajaInstructivo{
background:white;
padding:25px;
border-radius:20px;
width:350px;
text-align:center;
}

#cajaInstructivo button{
padding:12px 22px;
margin:6px;
border:none;
border-radius:12px;
background:#FFD700;
cursor:pointer;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="avatar" class="avatar-esquina"></div>

<audio id="audioInstructivo" src="instruc-memorama.mp3"></audio>

<div id="instructivo">
<div id="cajaInstructivo">
<h2>🎮 ¿Cómo jugar?</h2>
<p>
Voltea las cartas 🃏<br><br>
Encuentra las parejas iguales 🧠<br><br>
¡Memoriza y gana! 🎉
</p>
<button onclick="cerrarInstructivo()">Jugar ▶️</button>
</div>
</div>

<div id="nivelTexto">Nivel: -</div>

<div id="game">
<h2>Memorama - Plato del Bien Comer</h2>
<div id="game-board"></div>
<div id="message"></div>
<button id="backBtn" onclick="volverZona()">Volver a la zona de juegos</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   CONFIGURACIÓN SUPABASE
========================= */
const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV";
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

async function registrarProgresoMemorama(puntos) {
    const nombre = localStorage.getItem("nombreAlumno");
    if (!nombre) return;

    const { data: alumno } = await supabaseClient
        .from('alumnos')
        .select('id')
        .eq('nombre_alumno', nombre)
        .single();

    if (alumno) {
        await supabaseClient.from('progreso').upsert({
            id_alumno: alumno.id,
            archivo: "Juego Memorama",
            porcentaje: puntos, // Guardamos los puntos acumulados
            completado: true,
            fecha: new Date().toISOString()
        }, { onConflict: 'id_alumno, archivo' });
    }
}

/* =========================
   VARIABLES Y ESTADO
========================= */
let niveles = [6, 16, 24];
let nombres = ["Fácil", "Medio", "Difícil"];
let nivelIndex = 0;

let board = document.getElementById("game-board");
let message = document.getElementById("message");
let firstCard = null, secondCard = null;
let lockBoard = false;
let matches = 0;
let selected = [];
let totalPuntos = 0;

const allCards = ["🍎", "🥦", "🍌", "🌽", "🍞", "🍚", "🫘", "🥜", "🥬", "🥚", "🐟", "🍗"];

// Cargar Avatar
const avatarGuardado = localStorage.getItem("avatarElegido") || localStorage.getItem("avatarSeleccionado");
if (avatarGuardado) {
    document.getElementById("avatar").innerText = avatarGuardado;
}

/* =========================
   CONTROL DE AUDIO E INSTRUCTIVO
========================= */
let audioInstructivo = document.getElementById("audioInstructivo");
let primerAudio = false;

function activarAudioEntrada() {
    if (primerAudio) return;
    primerAudio = true;
    audioInstructivo.play().catch(() => {});
    document.removeEventListener("mousedown", activarAudioEntrada);
}
document.addEventListener("mousedown", activarAudioEntrada);

function cerrarInstructivo() {
    document.getElementById("instructivo").style.display = "none";
    audioInstructivo.pause();
    audioInstructivo.currentTime = 0;
    nivelIndex = 0;
    iniciarNivel();
}

function volverZona() {
    window.location.href = "entradajuegos.html";
}

/* =========================
   LÓGICA DEL JUEGO
========================= */
function iniciarNivel() {
    document.getElementById("game").style.display = "block";
    document.getElementById("nivelTexto").innerText = "Nivel: " + nombres[nivelIndex];
    startGame(niveles[nivelIndex]);
}

function shuffle(array) {
    return array.sort(() => 0.5 - Math.random());
}

function startGame(level) {
    board.innerHTML = "";
    message.textContent = "";
    matches = 0;
    firstCard = null;
    secondCard = null;
    lockBoard = false;

    selected = shuffle([...allCards]).slice(0, level / 2);
    let gameCards = shuffle([...selected, ...selected]);

    // Ajuste de columnas
    if (level === 6) board.style.gridTemplateColumns = "repeat(3, 120px)";
    else if (level === 16) board.style.gridTemplateColumns = "repeat(4, 120px)";
    else if (level === 24) board.style.gridTemplateColumns = "repeat(6, 120px)";

    gameCards.forEach(emoji => {
        const card = document.createElement("div");
        card.classList.add("card");
        const inner = document.createElement("div");
        inner.classList.add("card-inner");
        const front = document.createElement("div");
        front.classList.add("card-front");
        front.textContent = emoji;
        const back = document.createElement("div");
        back.classList.add("card-back");
        back.textContent = "❓";

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);
        card.dataset.emoji = emoji;
        card.addEventListener("click", () => flipCard(card));
        board.appendChild(card);
    });
}

function flipCard(card) {
    if (lockBoard || card.classList.contains("flip")) return;

    card.classList.add("flip");

    if (!firstCard) {
        firstCard = card;
        return;
    }

    secondCard = card;

    if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
        matches++;
        totalPuntos += 10;
        
        // Guardar avance en Supabase cada vez que encuentra una pareja
        registrarProgresoMemorama(totalPuntos);
        
        resetTurn();

        if (matches === selected.length) {
            if (nivelIndex < niveles.length - 1) {
                message.textContent = "¡Nivel completado! 🌟";
                setTimeout(() => {
                    nivelIndex++;
                    iniciarNivel();
                }, 1500);
            } else {
                message.textContent = "🏆 ¡ERES UN MAESTRO DE LA MEMORIA!";
            }
        }
    } else {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove("flip");
            secondCard.classList.remove("flip");
            resetTurn();
        }, 800);
    }
}

function resetTurn() {
    [firstCard, secondCard] = [null, null];
    lockBoard = false;
}

/* SONIDO DE CLICK */
const clickSound = new Audio("click.mp3");
document.body.addEventListener("click", (e) => {
    if (e.target.tagName === "BUTTON" || e.target.closest(".card")) {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
    }
});
</script>

  
</body>
</html>
