<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DishKids</title>

<style>

body{
font-family: Comic Sans MS;
background:#F5E6D3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* AVATAR */

.avatar-esquina{
position:absolute;

top:20px;
left:20px;

background:white;

padding:15px 20px;

border-radius:20px;

display:flex;
align-items:center;
gap:12px;

box-shadow:
0 8px 20px rgba(0,0,0,0.15);

z-index:9999;

animation:
avatarEntrada 1s ease;
}

@keyframes avatarEntrada{

from{
opacity:0;
transform:translateX(-40px);
}

to{
opacity:1;
transform:translateX(0);
}

}

.avatarEmoji{
font-size:50px;
}

.avatarTexto{
font-size:20px;
font-weight:bold;
color:#5c4630;
}
   
@keyframes entradaAvatar{
to{
opacity:1;
transform:scale(1) rotate(0deg);
}
}

#escena{
background:#c3eaf6;
width:900px;
height:650px;
border-radius:25px;
box-shadow:0 0 25px rgba(0,0,0,0.2);
padding:30px;
text-align:center;
position:relative;
overflow:hidden;
}

h1{
color:#000000;
font-size:32px;
}

#personaje{
height:380px;
display:flex;
justify-content:center;
align-items:center;
}

#personaje video{
width:700px;
height:360px;
border-radius:15px;
animation: flotar 3s infinite ease-in-out;
}

@keyframes flotar{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

/* Animación de entrada */
@keyframes entrada{
0%{
opacity:0;
transform:translateY(40px) scale(0.95);
}
100%{
opacity:1;
transform:translateY(0px) scale(1);
}
}

.animar{
animation: entrada 0.7s ease;
}

#cuento{
font-size:22px;
margin-top:20px;
min-height:120px;
padding:0 20px;
}

button{
padding:14px 30px;
font-size:20px;
background:#6b8e6b;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
transition:0.3s;
}

button:hover{
background:#4f6f4f;
transform:translateX(-50%) scale(1.05);
}

</style>
</head>

<body>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- AVATAR -->
<div class="avatar-esquina">

<div id="avatarUsuario"
class="avatarEmoji">
</div>

<div class="avatarTexto">
Tu Avatar
</div>

</div>

<div id="escena">

<h1>La Aventura del Plato del Bien Comer</h1>

<div id="personaje">
<video id="imagen"
src="Historia1.mp4"
autoplay
muted
loop>
</video>
</div>

<p id="cuento">
Un día Leo y Mariana encontraron un misterioso Plato del Bien Comer en su cocina.
</p>

<button id="boton">
Siguiente
</button>

</div>

<script>

/* =========================
   SUPABASE
========================= */

const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV"
const supabase =
window.supabase.createClient(
_supabaseUrl,
_supabaseKey
);

/* =========================
   MOSTRAR AVATAR
========================= */

const avatar =
localStorage.getItem(
'avatarSeleccionado'
);

if(avatar){

document.getElementById(
'avatarUsuario'
).innerText = avatar;

}

/* =========================
   VARIABLES
========================= */

let paso = 0;

let historia = [

"Un día Leo y Mariana encontraron un misterioso Plato del Bien Comer en su cocina.",

"El plato tenía muchos colores y representaba los diferentes alimentos que ayudan al cuerpo a crecer sano y fuerte.",

"Leo y Mariana comenzaron a observar cada parte del plato con mucha curiosidad.",

"Primero descubrieron el grupo de las frutas y verduras, que ayudan a proteger el cuerpo y mantenerlo saludable.",

"Después observaron los cereales, que dan energía para correr, jugar y aprender todos los días.",

"También encontraron las leguminosas y alimentos de origen animal, que ayudan al cuerpo a crecer fuertes.",

"Al final, Leo y Mariana comprendieron que comer de todos los grupos del Plato del Bien Comer es la mejor forma de cuidar su salud.",

"Gracias por escuchar nuestra historia ¡Nos vemos en la próxima aventura saludable!"

];

let imagenes = [

"Historia1.mp4",
"Historia2.mp4",
"Historia3.mp4",
"Historia4.mp4",
"Historia5.mp4",
"Historia6.mp4",
"Historia7.mp4",
"Historia8.mp4"

];

let audios = [

"1.mp3",
"2.mp3",
"3.mp3",
"4.mp3",
"5.mp3",
"6.mp3",
"7.mp3",
"8.mp3"

];

let narrador =
new Audio(audios[0]);

/* =========================
   INICIO
========================= */

window.onload = function(){

narrador.play().catch(()=>{});

animarEntrada();

guardarInicioHistoria();

};

/* =========================
   ANIMACIÓN
========================= */

function animarEntrada(){

let video =
document.getElementById("imagen");

let texto =
document.getElementById("cuento");

video.classList.remove("animar");
texto.classList.remove("animar");

void video.offsetWidth;

video.classList.add("animar");
texto.classList.add("animar");

}

/* =========================
   SIGUIENTE ESCENA
========================= */

function siguiente(){

paso++;

if(paso >= historia.length){

return;

}

/* CAMBIAR TEXTO */

document.getElementById(
"cuento"
).innerText = historia[paso];

/* CAMBIAR VIDEO */

let video =
document.getElementById(
"imagen"
);

video.src = imagenes[paso];

video.load();

video.play();

/* CAMBIAR AUDIO */

narrador.pause();

narrador =
new Audio(audios[paso]);

narrador.play().catch(()=>{});

/* ANIMACIONES */

animarEntrada();

/* GUARDAR AVANCE */

guardarPasoHistoria(paso);

/* CAMBIAR BOTÓN */

if(paso === historia.length - 1){

const boton =
document.getElementById(
"boton"
);

boton.innerHTML =
"🎮 Ir a los Juegos";

}

}

/* =========================
   IR A JUEGOS
========================= */

async function irAJuegos(){

const nombre =
localStorage.getItem(
"nombreAlumno"
);

const avatarUsuario =
localStorage.getItem(
"avatarSeleccionado"
);

/* GUARDAR FINAL */

await supabase
.from("actividad")
.insert([
{
nombre:nombre,
avatar:avatarUsuario,
seccion:"Historia",
accion:"Terminó la historia"
}
]);

window.location.href =
"entradajuegos.html";

}

/* =========================
   GUARDAR INICIO
========================= */

async function guardarInicioHistoria(){

const nombre =
localStorage.getItem(
"nombreAlumno"
);

const avatarUsuario =
localStorage.getItem(
"avatarSeleccionado"
);

const { error } =
await supabase
.from("actividad")
.insert([
{
nombre:nombre,
avatar:avatarUsuario,
seccion:"Historia",
accion:"Entró a la historia"
}
]);

if(error){

console.log(error);

}

}

/* =========================
   GUARDAR AVANCE
========================= */

async function guardarPasoHistoria(numero){

const nombre =
localStorage.getItem(
"nombreAlumno"
);

const avatarUsuario =
localStorage.getItem(
"avatarSeleccionado"
);

const { error } =
await supabase
.from("actividad")
.insert([
{
nombre:nombre,
avatar:avatarUsuario,
seccion:"Historia",
accion:
"Avanzó al paso " + (numero + 1)
}
]);

if(error){

console.log(error);

}

}

   /* =========================
   BOTÓN
========================= */

document.getElementById(
"boton"
).addEventListener(
"click",
function(){

if(
paso === historia.length - 1
){

irAJuegos();

}else{

siguiente();

}

}
);

</script>

</body>
</html>
