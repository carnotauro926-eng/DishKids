<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DishKids</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&display=swap');

/* =========================
   AVATAR
========================= */
.avatar-esquina{
position:fixed;
top:15px;
left:15px;
font-size:50px;
background:#fff;
border-radius:50%;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;

/* ANIMACIÓN */
opacity:0;
transform:scale(0.3) rotate(-180deg);
animation:entradaAvatar 0.8s ease-out forwards;
}

@keyframes entradaAvatar{
to{
opacity:1;
transform:scale(1) rotate(0deg);
}
}

/* =========================
   BODY
========================= */
body{
margin:0;
font-family:'Baloo 2', cursive;
text-align:center;
background: linear-gradient(135deg,#ff6ec4,#7873f5,#4ade80);
background-size: 300% 300%;
animation: bgMove 10s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ANIMACIONES */
@keyframes dropTitle{
from{opacity:0; transform:translateY(-60px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes zoomIn{
from{opacity:0; transform:scale(0.5);}
to{opacity:1; transform:scale(1);}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

/* TÍTULO */
h1{
margin-top:20px;
font-size:40px;
animation: dropTitle 1s ease forwards;
}

/* CÍRCULO */
#circle{
width:320px;
height:320px;
border-radius:50%;
margin:20px auto;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;

background: rgba(255,255,255,0.15);
border: 3px dashed rgba(255,255,255,0.6);
backdrop-filter: blur(10px);
box-shadow: 0 10px 30px rgba(0,0,0,0.3);

animation: zoomIn 1s ease forwards;
transition: transform 0.3s;
}

#circle:hover{
transform: scale(1.05);
}

/* CONTENEDOR */
#foodWrapper{
margin-top:20px;
}

/* FILAS */
.foodRow{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
margin:10px 0;
}

/* EMOJIS SELECCIONABLES */
.food{
font-size:32px;
cursor:grab;
padding:12px;
background: rgba(255,255,255,0.25);
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition: transform 0.2s, background 0.3s;
user-select:none;

opacity:0;
animation: fadeUp 0.6s ease forwards;
}

.food:nth-child(odd){
animation-delay:0.2s;
}

.food:nth-child(even){
animation-delay:0.4s;
}

.food:hover{
transform: scale(1.2) rotate(5deg);
background: rgba(255,255,255,0.5);
}

/* BOTONES */
button, a.button{
padding:12px 18px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
text-decoration:none;
color:white;

background: linear-gradient(45deg,#ff4d6d,#ffb703);
box-shadow: 0 5px 15px rgba(0,0,0,0.3);

transition: all 0.3s ease;

opacity:0;
animation: fadeUp 1s ease forwards;
}

button:hover, a.button:hover{
transform: scale(1.1);
box-shadow: 0 0 20px white;
}

/* RESULTADO */
#result{
font-size:22px;
margin-top:15px;
font-weight:bold;
animation: fadeUp 1s ease;
}
</style>
   
</head>

<body>

<!-- AVATAR -->
<div id="avatarUsuario" class="avatar-esquina"></div>

<h1>Crea tu Plato Saludable</h1>

<audio id="welcomeAudio" autoplay>
<source src="bienvenida.mp3" type="audio/mpeg">
</audio>

<div id="circle">
Arrastra aquí tu comida
</div>

<div id="foodWrapper">
<div id="row1" class="foodRow"></div>
<div id="row2" class="foodRow"></div>
</div>

<button>OK</button>
<button>Crear otro plato</button>
<a class="button" href="entradajuegos.html">
Ir al área de juegos
</a>

<div id="result"></div>

<script>
/* MOSTRAR AVATAR */
const avatar =
localStorage.getItem("avatarElegido") ||
localStorage.getItem("avatarSeleccionado");

if(avatar){
document.getElementById("avatarUsuario").innerHTML = avatar;
}else{
document.getElementById("avatarUsuario").innerHTML = "🙂";
}

window.onload = loadFoods;
</script>

</body>
</html>
