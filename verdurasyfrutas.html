<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    min-height:100vh;

    background:linear-gradient(135deg,#dcfce7,#bbf7d0);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* FONDO EMOJIS */

.fondo{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.emoji{
    position:absolute;
    font-size:40px;
    animation:flotar linear infinite;
    opacity:0.25;
}

@keyframes flotar{

    from{
        transform:translateY(110vh) rotate(0deg);
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
    }

}

/* CONTENEDOR */

.contenedor{
    position:relative;
    z-index:2;

    width:95%;
    max-width:1200px;

    padding:30px;

    animation:entrada 1s ease;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(50px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* AVATAR */

.avatarBox{
    position:absolute;
    top:20px;
    left:20px;

    background:white;
    padding:15px 20px;

    border-radius:20px;

    display:flex;
    align-items:center;
    gap:12px;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);

    animation:avatarEntrada 1s ease;
}

@keyframes avatarEntrada{

    from{
        opacity:0;
        transform:translateX(-40px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }

}

.avatarEmoji{
    font-size:50px;
}

.avatarTexto{
    font-size:20px;
    font-weight:bold;
    color:#166534;
}

/* TITULO */

h1{
    text-align:center;
    font-size:50px;
    color:#166534;

    margin-top:60px;
    margin-bottom:50px;

    animation:titulo 1s ease;
}

@keyframes titulo{

    from{
        opacity:0;
        transform:scale(0.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}

/* TARJETAS */

.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;

    border-radius:30px;

    padding:35px;

    cursor:pointer;

    transition:0.4s;

    box-shadow:0 10px 25px rgba(0,0,0,0.15);

    text-align:center;

    animation:tarjetaEntrada 1.2s ease;
}

@keyframes tarjetaEntrada{

    from{
        opacity:0;
        transform:translateY(60px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.tarjeta:hover{
    transform:scale(1.05) rotate(1deg);
    background:#f0fdf4;
}

.icono{
    font-size:80px;
    margin-bottom:20px;

    animation:rebote 2s infinite;
}

@keyframes rebote{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

.tarjeta p{
    font-size:24px;
    line-height:1.6;
    color:#14532d;
}

/* BOTONES */

.botones{
    margin-top:60px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

button{
    padding:20px;

    border:none;
    border-radius:25px;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;

    color:white;

    transition:0.3s;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

button:hover{
    transform:scale(1.08);
}

.cereales{
    background:#f59e0b;
}

.leguminosas{
    background:#8b5cf6;
}

.animal{
    background:#ef4444;
}

.menu{
    background:#10b981;
}

/* RESPONSIVE */

@media(max-width:768px){

    h1{
        font-size:36px;
    }

    .tarjeta p{
        font-size:20px;
    }

}

</style>
</head>

<body>

<!-- AUDIO DE ENTRADA -->
<audio id="audioInicio" src="Seccionfrutasyverduras.mp3"></audio>

<!-- AUDIO TARJETA 1 -->
<audio id="audio1" src="FrutasVer.mp3"></audio>

<!-- AUDIO TARJETA 2 -->
<audio id="audio2" src="Importanciafrutas.mp3"></audio>

<!-- FONDO -->
<div class="fondo" id="fondo"></div>

<!-- AVATAR -->
<div class="avatarBox">

    <div class="avatarEmoji" id="avatar"></div>


</div>

<!-- CONTENIDO -->
<div class="contenedor">

    <h1>
        🥦 Verduras y Frutas 🍎
    </h1>

    <!-- TARJETAS -->
    <div class="tarjetas">

        <!-- TARJETA 1 -->
        <div class="tarjeta"
        onclick="reproducirAudio('audio1')">

            <div class="icono">
                🍓🥕🥦🍎
            </div>

            <p>
                Incluye verduras como brócoli,
                zanahoria, espinaca y frutas
                como manzana, fresa, mango y naranja.
            </p>

        </div>

        <!-- TARJETA 2 -->
        <div class="tarjeta"
        onclick="reproducirAudio('audio2')">

            <div class="icono">
                🍊🥬🍇🥒
            </div>

            <p>
                Las verduras y frutas ayudan a
                que nuestro cuerpo esté fuerte y sano,
                nos dan vitaminas y energía.
            </p>

        </div>

    </div>

    <!-- BOTONES -->
    <div class="botones">

        <button class="cereales"
        onclick="window.location.href='cereales.html'">
            🌾 Cereales
        </button>

        <button class="leguminosas"
        onclick="window.location.href='leguminosas.html'">
            🫘 Leguminosas
        </button>

        <button class="animal"
        onclick="window.location.href='origenanimal.html'">
            🍗 Origen Animal
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================
   CONFIGURACIÓN SUPABASE
========================= */
const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV";
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

async function registrarAvance() {
    const nombre = localStorage.getItem("nombreAlumno");
    if (!nombre) return;

    // 1. Buscamos al alumno para obtener su ID
    const { data: alumno } = await supabaseClient
        .from('alumnos')
        .select('id')
        .eq('nombre_alumno', nombre)
        .single();

    if (alumno) {
        // 2. Registramos que está en la sección de Frutas y Verduras
        await supabaseClient.from('progreso').upsert({
            id_alumno: alumno.id,
            archivo: "verdurasyfrutas.html",
            porcentaje: 40, // Incrementamos el porcentaje
            completado: false,
            fecha: new Date().toISOString()
        }, { onConflict: 'id_alumno, archivo' });
    }
}

/* =========================
   LÓGICA EXISTENTE
========================= */
window.onload = function(){
    registrarAvance(); // Registrar al cargar

    const audio = document.getElementById("audioInicio");
    audio.play().catch(()=>{});

    // Cargar Avatar
    const avatarGuardado = localStorage.getItem("avatarSeleccionado");
    const avatar = document.getElementById("avatar");
    avatar.innerHTML = avatarGuardado || "🙂";

    // Crear Emojis flotantes
    crearEmojis();
};

function reproducirAudio(id){
    const audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play();
}

function crearEmojis() {
    const emojis = ["🍎","🍓","🥦","🥕","🍍","🍇","🥬","🍉","🍒","🥒","🍋","🌽"];
    const fondo = document.getElementById("fondo");
    for(let i=0;i<40;i++){
        const span = document.createElement("span");
        span.classList.add("emoji");
        span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        span.style.left = Math.random()*100 + "%";
        span.style.animationDuration = (8 + Math.random()*10) + "s";
        span.style.fontSize = (25 + Math.random()*35) + "px";
        span.style.animationDelay = Math.random()*5 + "s";
        fondo.appendChild(span);
    }
}
</script>
    
</body>
</html>
