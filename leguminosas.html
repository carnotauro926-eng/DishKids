<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DishKids</title>

<style>

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#f5f0e9,#ebe3d5);
min-height:100vh;
margin:0;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* AVATAR */
.avatar-esquina{
position:fixed;
top:15px;
right:15px;
font-size:50px;
background:white;
border-radius:50%;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;
}

/* CONTENIDO */
.content-wrapper{
position:relative;
z-index:10;
text-align:center;
max-width:1200px;
width:100%;
}

h1{
font-family:'Comic Sans MS', cursive;
color:#b45f06;
margin:40px 0;
font-size:3rem;
}

/* CARDS */
.container{
display:flex;
flex-wrap:wrap;
gap:40px;
justify-content:center;
}

.card{
width:420px;
background:white;
border-radius:20px;
box-shadow:0 12px 35px rgba(0,0,0,0.12);
overflow:hidden;
cursor:pointer;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card-header{
background:#f6b26b;
color:#6b3e00;
padding:20px;
font-size:1.8rem;
font-weight:bold;
}

.card-body{
padding:25px;
font-size:1.2rem;
line-height:1.6;
color:#333;
}

/* BOTONES */
.nav-buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.nav-buttons a{
text-decoration:none;
padding:14px 22px;
border-radius:12px;
font-weight:bold;
color:white;
}

.btn-verdes{background:#6ab04c;}
.btn-cereales{background:#f6d365;color:#5a4b00;}
.btn-animal{background:#ffd6c9;color:#7a3a2f;}

/* EMOJIS */
.emoji-float{
position:absolute;
font-size:2.5rem;
pointer-events:none;
animation:float 18s linear infinite;
opacity:0;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
10%{opacity:.7}
50%{opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="audioInicio" src="Seccionleguminosas.mp3"></audio>
<audio id="audio1" src="Leguminosas.mp3"></audio>
<audio id="audio2" src="Importancialeguminosas.mp3"></audio>

<!-- AVATAR -->
<div class="avatar-esquina" id="avatar">🙂</div>

<div class="content-wrapper">

<h1>¡Consume leguminosas!</h1>

<div class="container">

<div class="card" onclick="reproducir('audio1')">
<div class="card-header">Leguminosas</div>
<div class="card-body">
Frijoles, lentejas, garbanzos y habas.
</div>
</div>

<div class="card" onclick="reproducir('audio2')">
<div class="card-header">Importancia</div>
<div class="card-body">
Aportan proteínas vegetales, fibra y energía.
</div>
</div>

</div>

<div class="nav-buttons">
<a class="btn-verdes" href="verdurasyfrutas.html">Verduras</a>
<a class="btn-cereales" href="cereales.html">Cereales</a>
<a class="btn-animal" href="origenanimal.html">Origen Animal</a>
</div>

</div>

<script>

/* =========================
   AUDIO FIX REAL (IMPORTANTE)
========================= */

let unlocked = false;

function unlockAudio(){
unlocked = true;
document.getElementById("audioInicio").play().catch(()=>{});
}

window.addEventListener("click", unlockAudio, { once:true });

window.onload = () => {
document.getElementById("audioInicio").play().catch(()=>{});
crearEmojis();
};

/* =========================
   REPRODUCIR AUDIOS
========================= */

function reproducir(id){
const audio = document.getElementById(id);
audio.currentTime = 0;
audio.play().catch(()=>{});
}

/* =========================
   EMOJIS (ESTILO TU BUENO)
========================= */

function crearEmojis(){

const emojis = ["🫘","🌱","🥗","🍲","💪","⚡","🌿"];

for(let i=0;i<40;i++){

const e = document.createElement("div");
e.className="emoji-float";
e.textContent = emojis[Math.floor(Math.random()*emojis.length)];

e.style.left = Math.random()*100+"vw";
e.style.fontSize = (1.5 + Math.random()*1.5)+"rem";
e.style.animationDuration = (12 + Math.random()*10)+"s";
e.style.animationDelay = Math.random()*5+"s";

document.body.appendChild(e);

}
}

/* =========================
   AVATAR
========================= */

document.getElementById("avatar").innerText =
localStorage.getItem("avatarElegido") || "🙂";

</script>

</body>
</html>
