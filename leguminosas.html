<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>
/* Respetando el diseño exacto de la imagen proporcionada */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    background:linear-gradient(135deg,#f3e8ff,#ddd6fe); /* Tonos morados para leguminosas */
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* FONDO EMOJIS */
.fondo{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.emoji{
    position:absolute;
    font-size:40px;
    animation:flotar linear infinite;
    opacity:0.25;
}

@keyframes flotar{
    from{ transform:translateY(110vh) rotate(0deg); }
    to{ transform:translateY(-120vh) rotate(360deg); }
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    z-index:2;
    width:95%;
    max-width:1200px;
    padding:30px;
    animation:entrada 1s ease;
}

@keyframes entrada{
    from{ opacity:0; transform:translateY(50px); }
    to{ opacity:1; transform:translateY(0); }
}

/* AVATAR */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    animation:avatarEntrada 1s ease;
}

@keyframes avatarEntrada{
    from{ opacity:0; transform:translateX(-40px); }
    to{ opacity:1; transform:translateX(0); }
}

.avatarEmoji{ font-size:50px; }

/* TITULO */
h1{
    text-align:center;
    font-size:50px;
    color:#4c1d95; /* Color morado oscuro */
    margin-top:60px;
    margin-bottom:50px;
    animation:titulo 1s ease;
}

/* TARJETAS (ESTILO IMAGEN) */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;
    border-radius:30px;
    padding:35px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    animation:tarjetaEntrada 1.2s ease;
}

.tarjeta:hover{
    transform:scale(1.05) rotate(1deg);
    background:#f5f3ff;
}

.icono{
    font-size:80px;
    margin-bottom:20px;
    animation:rebote 2s infinite;
}

@keyframes rebote{
    0%, 100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

.tarjeta p{
    font-size:24px;
    line-height:1.6;
    color:#4c1d95;
}

/* BOTONES INFERIORES */
.botones{
    margin-top:60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

button{
    padding:20px;
    border:none;
    border-radius:25px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

button:hover{ transform:scale(1.08); }

.verdes{ background:#22c55e; }
.cereales{ background:#f59e0b; }
.animal{ background:#ef4444; }

@media(max-width:768px){
    h1{ font-size:36px; }
    .tarjeta p{ font-size:20px; }
}
</style>
</head>

<body>

<audio id="audioInicio" src="Seccionleguminosas.mp3"></audio>
<audio id="audio1" src="Leguminosas.mp3"></audio>
<audio id="audio2" src="Importancialeguminosas.mp3"></audio>

<div class="fondo" id="fondo"></div>

<div class="avatarBox">
    <div class="avatarEmoji" id="avatar"></div>
</div>

<div class="contenedor">

    <h1>🫘 Leguminosas 🍲</h1>

    <div class="tarjetas">

        <div class="tarjeta" onclick="reproducirAudio('audio1')">
            <div class="icono">🫘🌱🍲🌿</div>
            <p>
                Incluyen frijoles, 
                lentejas, garbanzos y habas.
            </p>
        </div>

        <div class="tarjeta" onclick="reproducirAudio('audio2')">
            <div class="icono">💪🥗⚡🍲</div>
            <p>
                Las leguminosas aportan proteínas vegetales,
                fibra y vitaminas para tener siempre energía.
            </p>
        </div>

    </div>

    <div class="botones">
        <button class="verdes" onclick="window.location.href='verdurasyfrutas.html'">
            🥦 Verduras y Frutas
        </button>

        <button class="cereales" onclick="window.location.href='cereales.html'">
            🌾 Cereales
        </button>

        <button class="animal" onclick="window.location.href='origenanimal.html'">
            🍗 Origen Animal
        </button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   CONFIGURACIÓN SUPABASE
========================= */
const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV";
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

async function registrarAvance() {
    const nombre = localStorage.getItem("nombreAlumno");
    if (!nombre) return;

    // 1. Buscamos al alumno para obtener su ID
    const { data: alumno } = await supabaseClient
        .from('alumnos')
        .select('id')
        .eq('nombre_alumno', nombre)
        .single();

    if (alumno) {
        const { error } = await supabaseClient.from('progreso').upsert({
            id_alumno: alumno.id,
            archivo: "leguminosas.html",
            porcentaje: 80,
            completado: true,
            fecha: new Date().toISOString()
        }, { onConflict: 'id_alumno,archivo' });
        if (error) console.error("Error guardando progreso:", error.message);
        else console.log("✅ Progreso leguminosas guardado");
    }
}

/* =========================
   LÓGICA DE LA PÁGINA
========================= */
window.onload = function(){
    registrarAvance(); // Registrar progreso al iniciar

    const audio = document.getElementById("audioInicio");
    audio.play().catch(()=>{});
    crearEmojis();

    // Cargar Avatar
    const avatarGuardado = localStorage.getItem("avatarSeleccionado") || localStorage.getItem("avatarElegido");
    const avatar = document.getElementById("avatar");
    avatar.innerHTML = avatarGuardado ? avatarGuardado : "🙂";
};

function reproducirAudio(id){
    const audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play();
}

function crearEmojis(){
    const emojis = ["🫘","🌱","🍲","🥗","🌿","💪"];
    const fondo = document.getElementById("fondo");

    for(let i=0;i<40;i++){
        const span = document.createElement("span");
        span.classList.add("emoji");
        span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        span.style.left = Math.random()*100 + "%";
        span.style.animationDuration = (8 + Math.random()*10) + "s";
        span.style.fontSize = (25 + Math.random()*35) + "px";
        span.style.animationDelay = Math.random()*5 + "s";
        fondo.appendChild(span);
    }
}
</script>

</body>
</html>
