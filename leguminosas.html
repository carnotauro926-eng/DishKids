<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;

    background:linear-gradient(135deg,#ede9fe,#c4b5fd);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* =========================
   FONDO EMOJIS (ARREGLADO)
========================= */

.fondo{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.emoji{
    position:absolute;
    font-size:40px;
    opacity:0.25;
    animation:flotar linear infinite;
}

@keyframes flotar{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    z-index:2;
    width:95%;
    max-width:1200px;
    padding:30px;
}

/* AVATAR */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    z-index:5;
}

.avatarEmoji{
    font-size:50px;
}

/* TITULO */
h1{
    text-align:center;
    font-size:50px;
    color:#5b21b6;
    margin:60px 0 40px;
}

/* TARJETAS */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;
    border-radius:30px;
    padding:35px;
    cursor:pointer;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.3s;
}

.tarjeta:hover{
    transform:scale(1.05);
}

.icono{
    font-size:70px;
    margin-bottom:20px;
}

/* BOTONES */
.botones{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

button{
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.verduras{background:#22c55e;}
.cereales{background:#f59e0b;}
.animal{background:#ef4444;}

/* fondo emojis correcto */
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="audioInicio" src="Seccionleguminosas.mp3"></audio>
<audio id="audio1" src="Leguminosas.mp3"></audio>
<audio id="audio2" src="Importancialeguminosas.mp3"></audio>

<!-- FONDO -->
<div class="fondo" id="fondo"></div>

<!-- AVATAR -->
<div class="avatarBox">
    <div class="avatarEmoji" id="avatar">🙂</div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

<h1>🫘 Leguminosas</h1>

<div class="tarjetas">

<div class="tarjeta" onclick="reproducirAudio('audio1')">
    <div class="icono">🫘🌱🥣</div>
    <p>Frijoles, lentejas, garbanzos...</p>
</div>

<div class="tarjeta" onclick="reproducirAudio('audio2')">
    <div class="icono">💪⚡🥗</div>
    <p>Aportan proteínas y energía.</p>
</div>

</div>

<div class="botones">
<button class="verduras">🥦 Verduras</button>
<button class="cereales">🌾 Cereales</button>
<button class="animal">🍗 Animal</button>
</div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* =========================
   SUPABASE
========================= */
const supabase = window.supabase.createClient(
"https://jxdlneupjqlyxanydzdl.supabase.co",
"sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV"
);

/* =========================
   AUDIO FIX REAL
========================= */

let audioDesbloqueado = false;

function desbloquearAudio(){
    audioDesbloqueado = true;

    const a = document.getElementById("audioInicio");
    a.play().catch(()=>{});
}

window.addEventListener("click", desbloquearAudio, { once:true });

window.addEventListener("load", () => {

    const audio = document.getElementById("audioInicio");

    audio.play().catch(()=>{});

    generarEmojis();
    guardarVisita();

});

/* =========================
   REPRODUCIR
========================= */

function reproducirAudio(id){

    const audio = document.getElementById(id);
    audio.currentTime = 0;

    audio.play().catch(()=>{});

}

/* =========================
   AVATAR
========================= */

document.getElementById("avatar").innerHTML =
localStorage.getItem("avatarSeleccionado") || "🙂";

/* =========================
   EMOJIS (ARREGLADO)
========================= */

function generarEmojis(){

const fondo = document.getElementById("fondo");

const emojis = ["🫘","🌱","🥣","🍲","💪","🥗","⚡","🌿"];

for(let i=0;i<50;i++){

    const span = document.createElement("span");
    span.className = "emoji";
    span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    span.style.left = Math.random()*100 + "%";
    span.style.fontSize = (20 + Math.random()*40) + "px";
    span.style.animationDuration = (8 + Math.random()*10) + "s";
    span.style.animationDelay = Math.random()*5 + "s";

    fondo.appendChild(span);
}

}

/* =========================
   SUPABASE LOG
========================= */

async function guardarVisita(){

await supabase.from("actividad").insert([{
    nombre: localStorage.getItem("nombreAlumno"),
    avatar: localStorage.getItem("avatarSeleccionado"),
    seccion:"Leguminosas",
    accion:"Entró"
}]);

}

</script>

</body>
</html>
