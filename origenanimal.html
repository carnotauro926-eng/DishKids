<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#fee2e2,#fecaca);
    position:relative;
}

/* FONDO EMOJIS */
.fondo{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.emoji{
    position:absolute;
    bottom:-100px;
    font-size:40px;
    opacity:0.25;
    animation:flotar linear infinite;
}

@keyframes flotar{
    from{ transform:translateY(110vh) rotate(0deg); }
    to{ transform:translateY(-120vh) rotate(360deg); }
}

/* CONTENIDO */
.contenedor{
    position:relative;
    z-index:2;
    width:95%;
    max-width:1200px;
    text-align:center;
}

/* AVATAR */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    gap:10px;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    z-index:10;
}

.avatarEmoji{
    font-size:50px;
}

/* TITULO */
h1{
    font-size:48px;
    color:#991b1b;
    margin-bottom:40px;
}

/* TARJETAS */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.tarjeta{
    background:white;
    padding:30px;
    border-radius:25px;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    transition:0.3s;
}

.tarjeta:hover{
    transform:scale(1.05);
    background:#fef2f2;
}

.icono{
    font-size:70px;
    margin-bottom:15px;
}

/* BOTONES */
.botones{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

button{
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.verduras{background:#22c55e;}
.cereales{background:#f59e0b;}
.leguminosas{background:#8b5cf6;}
.animal{background:#ef4444;}

</style>
</head>

<body>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- AUDIOS -->
<audio id="audioInicio" src="Seccionanimal.mp3" preload="auto"></audio>
<audio id="audio1" src="Origenanimal.mp3"></audio>
<audio id="audio2" src="Importanciaorigenanimal.mp3"></audio>

<!-- FONDO -->
<div class="fondo" id="fondo"></div>

<!-- AVATAR -->
<div class="avatarBox">
    <div class="avatarEmoji" id="avatar">🙂</div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

<h1>🍗 Origen Animal 🥚</h1>

<div class="tarjetas">

<div class="tarjeta" onclick="reproducir('audio1')">
<div class="icono">🍗🥚🧀</div>
<p>Incluye carne, pollo, pescado, leche y huevo.</p>
</div>

<div class="tarjeta" onclick="reproducir('audio2')">
<div class="icono">💪⚡🥛</div>
<p>Aportan proteínas para crecer fuerte.</p>
</div>

</div>

<div class="botones">

<button class="verduras" onclick="location.href='verdurasyfrutas.html'">Verduras</button>
<button class="cereales" onclick="location.href='cereales.html'">Cereales</button>
<button class="leguminosas" onclick="location.href='leguminosas.html'">Leguminosas</button>
<button class="animal" onclick="location.href='origenanimal.html'">Origen Animal</button>

</div>

</div>

<script>

/* =========================
   SUPABASE (CORREGIDO)
========================= */
const supabase = window.supabase.createClient(
  "https://jxdlneupjqlyxanydzdl.supabase.co",
  "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV"
);

/* =========================
   AUDIO INICIO (SEGURO)
========================= */
const audioInicio = document.getElementById("audioInicio");

function playInicio(){
    audioInicio.play().catch(()=>{});
}

window.addEventListener("load", () => {

    playInicio();

    document.body.addEventListener("click", () => {
        playInicio();
    }, { once:true });

    registrarEntrada();
});

/* =========================
   REPRODUCIR AUDIOS
========================= */
function reproducir(id){
    const a = document.getElementById(id);
    a.currentTime = 0;
    a.play().catch(()=>{});

    registrarAccion(id);
}

/* =========================
   SUPABASE: REGISTRO
========================= */

async function registrarEntrada(){

    const nombre = localStorage.getItem("nombreAlumno");
    const avatar = localStorage.getItem("avatarSeleccionado");

    if(!nombre) return;

    await supabase.from("actividad").insert([{
        nombre,
        avatar,
        seccion:"Origen Animal",
        accion:"Entró a la sección"
    }]);
}

async function registrarAccion(id){

    const nombre = localStorage.getItem("nombreAlumno");
    const avatar = localStorage.getItem("avatarSeleccionado");

    let accion = "";

    if(id === "audio1") accion = "Escuchó información";
    if(id === "audio2") accion = "Escuchó importancia";

    await supabase.from("actividad").insert([{
        nombre,
        avatar,
        seccion:"Origen Animal",
        accion
    }]);
}

/* =========================
   EMOJIS FLOTANTES
========================= */

const emojis = ["🍗","🥚","🧀","🐟","🥛","🍖","💪","⚡"];
const fondo = document.getElementById("fondo");

for(let i=0;i<50;i++){
    const span = document.createElement("span");
    span.classList.add("emoji");
    span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    span.style.left = Math.random()*100 + "%";
    span.style.fontSize = (20 + Math.random()*40) + "px";
    span.style.animationDuration = (8 + Math.random()*10) + "s";
    span.style.animationDelay = Math.random()*5 + "s";

    fondo.appendChild(span);
}

</script>

</body>
</html>
