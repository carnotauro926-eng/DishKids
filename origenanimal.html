<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DishKids</title>

<style>
/* RESET Y ESTILO BASE */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    background:linear-gradient(135deg,#fee2e2,#fecaca);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* FONDO EMOJIS */
.fondo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
}

.emoji-flotante {
    position: absolute;
    bottom: -50px;
    font-size: 40px;
    animation: flotar linear infinite;
    opacity: 0.3;
}

@keyframes flotar {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(-120vh) rotate(360deg); }
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    z-index:10;
    width:95%;
    max-width:1200px;
    padding:30px;
    text-align: center;
}

/* AVATAR */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    z-index: 20;
}

.avatarEmoji{ font-size:50px; }

h1{
    font-size:50px;
    color:#991b1b;
    margin-bottom:50px;
}

/* TARJETAS */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;
    border-radius:30px;
    padding:35px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.tarjeta:hover{ transform:scale(1.05); background:#fff1f2; }

.icono{ font-size:80px; margin-bottom:20px; }

.tarjeta p{ font-size:24px; color:#7f1d1d; }

/* BOTONES ALINEADOS */
.botones{
    margin-top:40px;
    display:grid;
    /* Ajustado para que todos quepan en la misma fila si hay espacio */
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); 
    gap:20px;
}

button{
    padding:20px;
    border:none;
    border-radius:25px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
    width: 100%; /* Asegura que todos midan lo mismo dentro de su celda */
}

button:hover {
    transform: scale(1.05);
}

.verdes{ background:#22c55e; }
.cereales{ background:#f59e0b; }
.leguminosas{ background:#8b5cf6; }

/* BOTÓN AZUL - AHORA IGUAL AL RESTO */
.sigue-adelante {
    background: #3b82f6; 
}

.sigue-adelante:hover {
    background: #2563eb;
}

</style>
</head>

<body>

<audio id="audioInicio" src="Seccionanimal.mp3" preload="auto"></audio>
<audio id="audio1" src="Origenanimal.mp3" preload="auto"></audio>
<audio id="audio2" src="Importanciaorigenanimal.mp3" preload="auto"></audio>

<div class="fondo" id="contenedor-emojis"></div>

<div class="avatarBox">
    <div class="avatarEmoji" id="avatar">🙂</div>
</div>

<div class="contenedor">
    <h1>🍗 Origen Animal 🥚</h1>

    <div class="tarjetas">
        <div class="tarjeta" onclick="reproducir('audio1')">
            <div class="icono">🍗🥚🧀</div>
            <p>Incluye carne, pollo, pescado, leche y huevo.</p>
        </div>

        <div class="tarjeta" onclick="reproducir('audio2')">
            <div class="icono">💪⚡🥛</div>
            <p>Aportan proteínas para crecer fuerte.</p>
        </div>
    </div>

    <div class="botones">
        <button class="verdes" onclick="location.href='verdurasyfrutas.html'">🥦 Verduras</button>
        <button class="cereales" onclick="location.href='cereales.html'">🌾 Cereales</button>
        <button class="leguminosas" onclick="location.href='leguminosas.html'">🫘 Leguminosas</button>
        <button class="sigue-adelante" onclick="location.href='Hisoria.html'">🚀 Sigue Adelante</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
/* =========================
   SOLUCIÓN DE AUDIO
========================= */
function activarAudio() {
    const inicio = document.getElementById("audioInicio");
    inicio.play().catch(e => console.log("Esperando interacción..."));
    document.body.removeEventListener('click', activarAudio);
}

document.body.addEventListener('click', activarAudio);

window.onload = () => {
    crearEmojis();
    const avatar = localStorage.getItem("avatarSeleccionado") || "🙂";
    document.getElementById("avatar").innerHTML = avatar;
};

function reproducir(id) {
    const a = document.getElementById(id);
    a.currentTime = 0;
    a.play().catch(e => alert("Haz clic en la pantalla primero para activar el sonido"));
}

/* =========================
   SOLUCIÓN EMOJIS
========================= */
function crearEmojis() {
    const lista = ["🍗","🥚","🧀","🐟","🥛","🍖"];
    const contenedor = document.getElementById("contenedor-emojis");

    for(let i=0; i<30; i++) {
        const span = document.createElement("span");
        span.className = "emoji-flotante";
        span.innerHTML = lista[Math.floor(Math.random()*lista.length)];
        
        span.style.left = Math.random() * 100 + "%";
        span.style.animationDuration = (5 + Math.random() * 10) + "s";
        span.style.animationDelay = (Math.random() * 5) + "s";
        span.style.fontSize = (20 + Math.random() * 30) + "px";
        
        contenedor.appendChild(span);
    }
}
</script>
</body>
</html>
