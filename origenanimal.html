<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
    min-height:100vh;

    background:linear-gradient(135deg,#fee2e2,#fecaca);

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* CAPA OSCURA SUAVE */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.05);
    z-index:1;
    pointer-events:none;
}

/* FONDO EMOJIS */
.fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

.emoji{
    position:absolute;
    bottom:-120px;
    opacity:0.3;
    animation:flotar linear infinite;
}

@keyframes flotar{
    0%{
        transform:translateY(0) rotate(0deg) scale(0.7);
        opacity:0;
    }
    50%{
        opacity:0.3;
    }
    100%{
        transform:translateY(-130vh) rotate(360deg) scale(1.2);
        opacity:0;
    }
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    z-index:2;
    width:95%;
    max-width:1200px;
    padding:30px;
}

/* AVATAR */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    align-items:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.avatarEmoji{
    font-size:50px;
}

/* TITULO */
h1{
    text-align:center;
    font-size:50px;
    color:#7f1d1d;
    margin-bottom:40px;
}

/* TARJETAS */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;
    border-radius:30px;
    padding:35px;
    cursor:pointer;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.tarjeta:hover{
    transform:scale(1.05);
    background:#fef2f2;
}

.icono{
    font-size:70px;
    margin-bottom:15px;
}

/* BOTONES */
.botones{
    margin-top:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

button{
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
    color:white;
}

.verduras{background:#22c55e;}
.cereales{background:#f59e0b;}
.leguminosas{background:#8b5cf6;}
.siguiente{background:#2563eb;}

</style>
</head>

<body>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- AUDIOS -->
<audio id="audioInicio" src="./seccion-animal.mp3"></audio>
<audio id="audio1" src="./info-animal.mp3"></audio>
<audio id="audio2" src="./importancia-animal.mp3"></audio>

<!-- FONDO -->
<div class="fondo" id="fondo"></div>

<!-- AVATAR -->
<div class="avatarBox">
    <div class="avatarEmoji" id="avatar"></div>
</div>

<!-- CONTENIDO -->
<div class="contenedor">

<h1>🍗 Origen Animal 🥚</h1>

<div class="tarjetas">

    <div class="tarjeta" onclick="reproducirAudio('audio1')">
        <div class="icono">🍗🥩🥚</div>
        <p>Incluye carne, huevo, leche y pescado.</p>
    </div>

    <div class="tarjeta" onclick="reproducirAudio('audio2')">
        <div class="icono">💪⚡🧀</div>
        <p>Ayudan al crecimiento y fortalecen el cuerpo.</p>
    </div>

</div>

<div class="botones">

    <button class="verduras"
    onclick="location.href='verdurasyfrutas.html'">
        🥦 Verduras
    </button>

    <button class="cereales"
    onclick="location.href='cereales.html'">
        🌾 Cereales
    </button>

    <button class="leguminosas"
    onclick="location.href='leguminosas.html'">
        🫘 Leguminosas
    </button>

    <button class="siguiente"
    onclick="location.href='Historia.html'">
        ➡️ Siguiente
    </button>

</div>

</div>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
"https://jxdlneupjqlyxanydzdl.supabase.co",
"sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV"
);

/* AUDIO CONTROL */
let audioActivo = null;

function reproducir(audio){

    if(audioActivo){
        audioActivo.pause();
        audioActivo.currentTime = 0;
    }

    audioActivo = audio;

    audio.play().catch(()=>{});

}

/* AUDIO INICIO (FIX REAL) */
window.addEventListener("load", () => {

    const audioInicio =
    document.getElementById("audioInicio");

    reproducir(audioInicio);

    document.body.addEventListener("click", () => {
        reproducir(audioInicio);
    }, { once:true });

    guardarVisita();

});

/* AVATAR */
document.getElementById("avatar").innerHTML =
localStorage.getItem("avatarSeleccionado") || "🙂";

/* AUDIO TARJETAS */
async function reproducirAudio(id){

    const audio = document.getElementById(id);
    audio.currentTime = 0;

    reproducir(audio);

    await supabase.from("actividad").insert([{
        nombre: localStorage.getItem("nombreAlumno"),
        avatar: localStorage.getItem("avatarSeleccionado"),
        seccion:"Origen Animal",
        accion:"Escuchó contenido"
    }]);

}

/* VISITA */
async function guardarVisita(){

    await supabase.from("actividad").insert([{
        nombre: localStorage.getItem("nombreAlumno"),
        avatar: localStorage.getItem("avatarSeleccionado"),
        seccion:"Origen Animal",
        accion:"Entró a la sección"
    }]);

}

/* EMOJIS FLOTANTES */
const emojis = ["🍗","🥩","🥚","🐟","🧀","🥛","🍔","🍕"];

const fondo = document.getElementById("fondo");

for(let i=0;i<60;i++){

    const span = document.createElement("span");

    span.className = "emoji";
    span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    span.style.left = Math.random()*100+"%";
    span.style.fontSize = (20+Math.random()*40)+"px";
    span.style.animationDuration = (8+Math.random()*10)+"s";
    span.style.animationDelay = Math.random()*5+"s";

    fondo.appendChild(span);
}

</script>

</body>
</html>
