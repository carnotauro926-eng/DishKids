<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DishKids</title>

<style>
/* ESTILOS EXACTOS A LA IMAGEN PROPORCIONADA */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    /* Fondo degradado rojizo para Origen Animal */
    background:linear-gradient(135deg,#fee2e2,#fecaca);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* FONDO EMOJIS */
.fondo{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.emoji{
    position:absolute;
    font-size:40px;
    animation:flotar linear infinite;
    opacity:0.25;
}

@keyframes flotar{
    from{ transform:translateY(110vh) rotate(0deg); }
    to{ transform:translateY(-120vh) rotate(360deg); }
}

/* CONTENEDOR PRINCIPAL */
.contenedor{
    position:relative;
    z-index:2;
    width:95%;
    max-width:1200px;
    padding:30px;
    animation:entrada 1s ease;
}

@keyframes entrada{
    from{ opacity:0; transform:translateY(50px); }
    to{ opacity:1; transform:translateY(0); }
}

/* AVATAR BOX */
.avatarBox{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:15px 20px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    animation:avatarEntrada 1s ease;
}

@keyframes avatarEntrada{
    from{ opacity:0; transform:translateX(-40px); }
    to{ opacity:1; transform:translateX(0); }
}

.avatarEmoji{ font-size:50px; }

/* TITULO */
h1{
    text-align:center;
    font-size:50px;
    color:#991b1b; /* Rojo oscuro */
    margin-top:60px;
    margin-bottom:50px;
    animation:titulo 1s ease;
}

/* TARJETAS */
.tarjetas{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.tarjeta{
    background:white;
    border-radius:30px;
    padding:35px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    animation:tarjetaEntrada 1.2s ease;
}

.tarjeta:hover{
    transform:scale(1.05) rotate(1deg);
    background:#fff1f2;
}

.icono{
    font-size:80px;
    margin-bottom:20px;
    animation:rebote 2s infinite;
}

@keyframes rebote{
    0%, 100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

.tarjeta p{
    font-size:24px;
    line-height:1.6;
    color:#7f1d1d;
}

/* BOTONES INFERIORES */
.botones{
    margin-top:60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

button{
    padding:20px;
    border:none;
    border-radius:25px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

button:hover{ transform:scale(1.08); }

/* COLORES DE BOTONES SEGÚN EL DISEÑO */
.verdes{ background:#22c55e; }
.cereales{ background:#f59e0b; }
.leguminosas{ background:#8b5cf6; }
.sigue-adelante{ background:#3b82f6; }

</style>
</head>

<body>

<audio id="audioInicio" src="Seccionanimal.mp3"></audio>
<audio id="audio1" src="Origenanimal.mp3"></audio>
<audio id="audio2" src="Importanciaorigenanimal.mp3"></audio>

<div class="fondo" id="fondo"></div>

<div class="avatarBox">
    <div class="avatarEmoji" id="avatar"></div>
</div>

<div class="contenedor">
    <h1>🍗 Origen Animal 🥚</h1>

    <div class="tarjetas">
        <div class="tarjeta" onclick="reproducirAudio('audio1')">
            <div class="icono">🍗🥚🧀🐟</div>
            <p>Incluye carne, pollo, pescado, leche, queso y huevo.</p>
        </div>

        <div class="tarjeta" onclick="reproducirAudio('audio2')">
            <div class="icono">💪⚡🥛🥩</div>
            <p>Los alimentos de origen animal nos aportan proteínas para crecer fuertes y sanos.</p>
        </div>
    </div>

    <div class="botones">
        <button class="verdes" onclick="window.location.href='verdurasyfrutas.html'">
            🥦 Verduras y Frutas
        </button>

        <button class="cereales" onclick="window.location.href='cereales.html'">
            🌾 Cereales
        </button>

        <button class="leguminosas" onclick="window.location.href='leguminosas.html'">
            🫘 Leguminosas
        </button>

        <button class="sigue-adelante" onclick="window.location.href='Historia.html'">
            🚀 Sigue Adelante
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   CONFIGURACIÓN SUPABASE
========================= */
const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV";
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

async function registrarAvance() {
    const nombre = localStorage.getItem("nombreAlumno");
    if (!nombre) return;

    // 1. Buscamos al alumno para obtener su ID
    const { data: alumno } = await supabaseClient
        .from('alumnos')
        .select('id')
        .eq('nombre_alumno', nombre)
        .single();

    if (alumno) {
        // 2. Registramos el progreso del 95%
        await supabaseClient.from('progreso').upsert({
            id_alumno: alumno.id,
            archivo: "origenanimal.html",
            porcentaje: 95,
            completado: false,
            fecha: new Date().toISOString()
        }, { onConflict: 'id_alumno, archivo' });
    }
}

/* =========================
   LÓGICA DE LA PÁGINA
========================= */

window.onload = function(){
    registrarAvance(); // Registro automático

    const audio = document.getElementById("audioInicio");
    audio.play().catch(error => {
        console.log("El audio se reproducirá tras el primer clic del usuario.");
    });

    crearEmojis();
    cargarAvatar();
};

/* FUNCIÓN CARGAR AVATAR */
function cargarAvatar() {
    const avatarGuardado = localStorage.getItem("avatarSeleccionado");
    const divAvatar = document.getElementById("avatar");
    divAvatar.innerHTML = avatarGuardado ? avatarGuardado : "🙂";
}

/* FUNCIÓN REPRODUCIR AUDIOS DE TARJETAS */
function reproducirAudio(id){
    const audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play();
}

/* EMOJIS FLOTANTES (PERSONALIZADOS PARA ORIGEN ANIMAL) */
function crearEmojis() {
    const emojis = ["🍗","🥚","🧀","🐟","🥛","🥩","🍖"];
    const fondo = document.getElementById("fondo");

    for(let i=0; i<35; i++){
        const span = document.createElement("span");
        span.classList.add("emoji");
        span.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        
        span.style.left = Math.random()*100 + "%";
        span.style.animationDuration = (8 + Math.random()*10) + "s";
        span.style.fontSize = (25 + Math.random()*35) + "px";
        span.style.animationDelay = Math.random()*5 + "s";

        fondo.appendChild(span);
    }
}
</script>

</body>
</html>
