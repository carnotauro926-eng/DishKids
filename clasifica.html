<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DishKids</title>

<style>
/* TODO IGUAL */
.avatar-esquina{
position:fixed;
top:15px;
right:15px;
font-size:50px;
background:#fff;
border-radius:50%;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;
opacity:0;
transform:scale(0.3) rotate(-180deg);
animation:entradaAvatar 0.8s ease-out forwards;
}

@keyframes entradaAvatar{
to{
opacity:1;
transform:scale(1) rotate(0deg);
}
}

body{
font-family:"Comic Sans MS";
text-align:center;
background:#ffd8b1;
padding:30px;
opacity:0;
transform:translateY(40px) scale(0.95);
animation:entradaPagina 0.8s ease forwards;
}

@keyframes entradaPagina{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

h1{
color:#d35400;
margin-bottom:15px;
}

#panel{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
}

#izquierda{
text-align:left;
font-size:20px;
}

#derecha{
text-align:right;
font-size:20px;
}

#barraContenedor{
width:220px;
height:18px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

#barra{
height:100%;
width:0%;
background:#4caf50;
}

#nivelActual{
font-weight:bold;
color:#b03a2e;
}

#botonesNivel{
display:none;
}

#btnVolver{
position:fixed;
bottom:20px;
right:20px;
background:#ff914d;
color:white;
border:none;
padding:12px 22px;
font-size:16px;
border-radius:12px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#alimentos{
display:grid;
justify-content:center;
gap:20px;
margin-top:10px;
margin-bottom:25px;
}

.alimento{
font-size:40px;
background:white;
padding:12px;
border-radius:12px;
cursor:grab;
box-shadow:0 0 5px gray;
}

#plato{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.zona{
width:200px;
height:140px;
background:white;
border:3px dashed #ff9f80;
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:20px;
}

.correcto{background:#b8f5b1 !important;}
.incorrecto{background:#ffb3b3 !important;}

#mensaje{
margin-top:20px;
font-size:24px;
font-weight:bold;
}

.confeti{
position:fixed;
width:10px;
height:10px;
top:0;
animation:caer 3s linear forwards;
}

@keyframes caer{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

#instructivo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#cajaInstructivo{
background:white;
padding:25px;
border-radius:20px;
width:350px;
text-align:center;
}

button{
padding:12px 22px;
margin:6px;
border:none;
border-radius:12px;
background:#FFD700;
cursor:pointer;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="avatarUsuario" class="avatar-esquina"></div>

<audio id="audioInstructivo" src="instruc-clasifica.mp3"></audio>

<div id="instructivo">
<div id="cajaInstructivo">
<h2>🎮 ¿Cómo jugar?</h2>
<p>
Arrastra los alimentos 🖐️<br><br>
Colócalos en su grupo correcto 🍎🌽🥚<br><br>
¡Gana puntos clasificando bien! 🎯
</p>
<button onclick="cerrarInstructivo()">Jugar ▶️</button>
</div>
</div>

<h1>Clasifica los alimentos</h1>

<div id="panel">
<div id="izquierda">
<p><b>Nivel actual:</b> <span id="nivelActual">-</span></p>
</div>

<div id="derecha">
<p>Puntos: <span id="puntos">0</span></p>
<div id="barraContenedor">
<div id="barra"></div>
</div>
</div>
</div>

<div id="alimentos"></div>

<div id="plato">
<div class="zona" data-grupo="frutas">🍎 Frutas y Verduras</div>
<div class="zona" data-grupo="cereales">🌽 Cereales</div>
<div class="zona" data-grupo="leguminosas">🫘 Leguminosas</div>
<div class="zona" data-grupo="animal">🥚 Origen Animal</div>
</div>

<div id="mensaje"></div>

<button id="btnVolver" onclick="volverZona()">Volver a la zona de juegos</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================
   CONFIGURACIÓN SUPABASE
========================= */
const _supabaseUrl = "https://jxdlneupjqlyxanydzdl.supabase.co";
const _supabaseKey = "sb_publishable_k-OLA_cUfQ_rFAXRrWz7LQ_yKPGQkrV";
const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

async function registrarProgresoClasifica(puntosActuales, nivelNombre) {
    const nombre = localStorage.getItem("nombreAlumno");
    if (!nombre) return;

    const { data: alumno } = await supabaseClient
        .from('alumnos')
        .select('id')
        .eq('nombre_alumno', nombre)
        .single();

    if (alumno) {
        await supabaseClient.from('progreso').upsert({
            id_alumno: alumno.id,
            archivo: "Juego Clasifica Alimentos",
            porcentaje: puntosActuales, // El maestro verá los puntos acumulados
            completado: true,
            fecha: new Date().toISOString()
        }, { onConflict: 'id_alumno, archivo' });
    }
}

/* =========================
   VARIABLES Y REFERENCIAS
========================= */
const alimentosHTML = document.getElementById("alimentos");
const mensaje = document.getElementById("mensaje");
const puntosHTML = document.getElementById("puntos");
const barra = document.getElementById("barra");
const nivelActualTexto = document.getElementById("nivelActual");
const audioInstructivo = document.getElementById("audioInstructivo");

let niveles = ["facil", "medio", "dificil"];
let nivelIndex = 0;
let cantidad = 0, columnas = 4, puntos = 0, total = 0;
let elementoActual = null;

const alimentos = [
    {emoji:"🍎",grupo:"frutas"},{emoji:"🍓",grupo:"frutas"},{emoji:"🥦",grupo:"frutas"},{emoji:"🥕",grupo:"frutas"},{emoji:" Pineapple",grupo:"frutas"},{emoji:"🍇",grupo:"frutas"},{emoji:"🍉",grupo:"frutas"},
    {emoji:"🌽",grupo:"cereales"},{emoji:"🍞",grupo:"cereales"},{emoji:"🍚",grupo:"cereales"},{emoji:"🥨",grupo:"cereales"},{emoji:"🥖",grupo:"cereales"},{emoji:"🌮",grupo:"cereales"},
    {emoji:"🫘",grupo:"leguminosas"},{emoji:" Peanut",grupo:"leguminosas"},{emoji:"🫛",grupo:"leguminosas"},{emoji:"🌱",grupo:"leguminosas"},{emoji:"🧆",grupo:"leguminosas"},{emoji:"🥗",grupo:"leguminosas"},
    {emoji:"🥚",grupo:"animal"},{emoji:"🍗",grupo:"animal"},{emoji:"🐟",grupo:"animal"},{emoji:"🧀",grupo:"animal"},{emoji:"🥛",grupo:"animal"},{emoji:"🍖",grupo:"animal"},{emoji:"🍤",grupo:"animal"},{emoji:"🍳",grupo:"animal"}
];

/* =========================
   LÓGICA DEL JUEGO
========================= */

// Cargar Avatar
const avatar = localStorage.getItem('avatarElegido') || localStorage.getItem('avatarSeleccionado');
if(avatar) document.getElementById("avatarUsuario").innerText = avatar;

function aplicarNivel(n) {
    if(n=="facil") { cantidad=8; columnas=4; nivelActualTexto.innerText="Fácil"; }
    if(n=="medio") { cantidad=12; columnas=6; nivelActualTexto.innerText="Medio"; }
    if(n=="dificil") { cantidad=16; columnas=8; nivelActualTexto.innerText="Difícil"; }

    puntos = 0;
    total = cantidad;
    puntosHTML.innerText = 0;
    actualizarBarra();
    iniciarJuego();
}

function cerrarInstructivo() {
    document.getElementById("instructivo").style.display = "none";
    audioInstructivo.pause();
    audioInstructivo.currentTime = 0;
    nivelIndex = 0;
    aplicarNivel(niveles[nivelIndex]);
}

function iniciarJuego() {
    alimentosHTML.style.gridTemplateColumns = `repeat(${columnas}, 80px)`;
    alimentosHTML.innerHTML = "";
    mensaje.innerText = "";

    let mezcla = [...alimentos].sort(() => Math.random() - 0.5).slice(0, cantidad);

    mezcla.forEach(item => {
        let div = document.createElement("div");
        div.className = "alimento";
        div.innerHTML = item.emoji;
        div.draggable = true;
        div.dataset.grupo = item.grupo;
        div.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("grupo", e.target.dataset.grupo);
            elementoActual = e.target;
        });
        alimentosHTML.appendChild(div);
    });
}

document.querySelectorAll(".zona").forEach(z => {
    z.addEventListener("dragover", (e) => e.preventDefault());
    z.addEventListener("drop", soltar);
});

function soltar(e) {
    e.preventDefault();
    let grupo = e.dataTransfer.getData("grupo");
    let zona = e.currentTarget.dataset.grupo;

    if (grupo === zona) {
        e.currentTarget.classList.add("correcto");
        mensaje.innerText = "¡Correcto! 🎉";
        if(elementoActual) elementoActual.remove();
        puntos += 5;
        puntosHTML.innerText = puntos;
        actualizarBarra();
        verificarFin();
    } else {
        e.currentTarget.classList.add("incorrecto");
        mensaje.innerText = "Intenta otra vez ❌";
    }

    setTimeout(() => e.target.classList.remove("correcto", "incorrecto"), 600);
}

function actualizarBarra() {
    let porcentaje = (puntos / (total * 5)) * 100;
    barra.style.width = porcentaje + "%";
}

function verificarFin() {
    if (document.querySelectorAll(".alimento").length === 0) {
        // Registro en Supabase
        registrarProgresoClasifica(puntos, nivelActualTexto.innerText);

        if (nivelIndex < niveles.length - 1) {
            mensaje.innerText = "¡Nivel completado! 🌟";
            setTimeout(() => {
                nivelIndex++;
                aplicarNivel(niveles[nivelIndex]);
            }, 1500);
        } else {
            mensaje.innerText = "¡Ganaste todo el juego! 🏆";
            confeti();
        }
    }
}

function confeti() {
    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}

function volverZona() {
    window.location.href = "entradajuegos.html";
}

/* SONIDOS */
const clickSound = new Audio("click.mp3");
document.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
    });
});

/* ACTIVACIÓN DE AUDIO POR INTERACCIÓN */
let primerAudio = false;
function activarAudioEntrada() {
    if (primerAudio) return;
    primerAudio = true;
    audioInstructivo.play().catch(() => {});
    document.removeEventListener("mousedown", activarAudioEntrada);
}
document.addEventListener("mousedown", activarAudioEntrada);

</script>
</body>
</html>
