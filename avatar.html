<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DishKids</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f5e6d3,#f1dcc3);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
}

.contenedor{
    width:100%;
    max-width:1000px;
    background:white;
    border-radius:30px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    text-align:center;

    animation:entrada 1s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(40px) scale(0.9);
    }

    to{
        opacity:1;
        transform:translateY(0px) scale(1);
    }
}

h1{
    color:#6b4f2f;
    margin-bottom:30px;
    font-size:38px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
    gap:18px;
}

.avatar{
    background:#fff7ec;
    border-radius:20px;
    padding:18px;
    cursor:pointer;
    transition:0.3s;
    border:3px solid transparent;

    animation:aparecer 0.7s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(0.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.avatar:hover{
    transform:scale(1.1) rotate(5deg);
    background:#fdf0dd;
}

.avatar.seleccionado{
    border-color:#10b981;
    background:#ecfdf5;
}

.emoji{
    font-size:55px;
}

/* MODAL */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:1000;
}

.modal-contenido{
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:400px;

    animation:popup 0.4s ease;
}

@keyframes popup{
    from{
        opacity:0;
        transform:scale(0.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.modal h2{
    color:#5c4630;
    margin-bottom:20px;
}

.avatarGrande{
    font-size:90px;
    margin-bottom:25px;
}

.botones{
    display:flex;
    gap:15px;
    justify-content:center;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.si{
    background:#10b981;
    color:white;
}

.si:hover{
    background:#059669;
    transform:scale(1.08);
}

.no{
    background:#ef4444;
    color:white;
}

.no:hover{
    background:#dc2626;
    transform:scale(1.08);
}

</style>
</head>

<body>

<!-- AUDIO AL ENTRAR -->
<audio id="audioInicio" src="avatar.mp3"></audio>

<!-- AUDIO AL ABRIR MODAL -->
<audio id="audioSeleccion" src="seleccion.mp3"></audio>

<div class="contenedor">

    <h1 id="saludo"></h1>

    <div class="grid" id="grid"></div>

</div>

<!-- VENTANA -->
<div class="modal" id="modal">

    <div class="modal-contenido">

        <h2>¿Quieres usar este avatar?</h2>

        <div class="avatarGrande" id="avatarGrande"></div>

        <div class="botones">

            <button class="si" onclick="confirmarAvatar()">
                Sí
            </button>

            <button class="no" onclick="cerrarModal()">
                No
            </button>

        </div>

    </div>

</div>

<script>
window.onload = function(){

    const audioInicio =
    document.getElementById("audioInicio");

    audioInicio.play().catch(()=>{});

    // OBTENER NOMBRE
    const nombre =
    localStorage.getItem("nombreAlumno");

    const saludo =
    document.getElementById("saludo");

    if(nombre){

        saludo.innerHTML =
        `👋 Hola ${nombre}`;

    }else{

        saludo.innerHTML =
        "👋 Hola";

    }

};

const avatares = [
"🦁","🐯","🐶","🐱","🐼",
"🐻","🐨","🦊","🐺","🐵",
"🐸","🐰","🐹","🐭","🦄",
"🐮","🐷","🐔","🦆","🦅",
"🦉","🐢","🐙","🐬","🦈",
"🐘","🦒","🦓","🦘","🦌",
"🦖","🐉"
];

const grid = document.getElementById("grid");

const modal = document.getElementById("modal");

const avatarGrande =
document.getElementById("avatarGrande");

const audioSeleccion =
document.getElementById("audioSeleccion");

let avatarSeleccionado = "";

avatares.forEach((emoji,index)=>{

    const div = document.createElement("div");

    div.classList.add("avatar");

    div.style.animationDelay =
    `${index * 0.04}s`;

    div.innerHTML = `
        <div class="emoji">${emoji}</div>
    `;

    div.onclick = ()=>{

        document.querySelectorAll(".avatar")
        .forEach(a=>
            a.classList.remove("seleccionado")
        );

        div.classList.add("seleccionado");

        avatarSeleccionado = emoji;

        avatarGrande.innerHTML = emoji;

        modal.style.display = "flex";

        audioSeleccion.currentTime = 0;

        audioSeleccion.play().catch(()=>{});
    };

    grid.appendChild(div);

});

function cerrarModal(){

    modal.style.display = "none";
}

function confirmarAvatar(){

    localStorage.setItem(
        "avatarSeleccionado",
        avatarSeleccionado
    );

    window.location.href = "eo.html";
}

</script>

</body>
</html>
